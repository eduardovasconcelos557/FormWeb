<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger House - Cadastro de Produto</title>
</head>
<body bgcolor="fce397">
    <h1 align="center">Cadastre um Novo Produto</h1>
    <p align="center"><img src="logo.png" width="13%"></p>
    <br>
    <h3 align="center">Insira as informações do produto que deseja cadastrar.</h3>
    <table align="center">
        <td align="center">
            <form>
                <label>Nome do Produto</label>
                <br>
                <input>
                <br><br>
                <label>Categoria</label>
                <br>
                <select>
                    <option>Selecione uma opção</option>
                    <option>Molhos</option>
                    <option>Ingredientes</option>
                    <option>Preparados</option>
                </select>
                <br><br>
                <label>Marca</label>
                <br>
                <input>
                <br><br>
                <label>Unidade de Medida</label><br>
                <select>
                    <option>Selecione uma opção</option>
                    <option>Grama (g)</option>
                    <option>Quilograma (kg)</option>
                    <option>Mililitros (ml)</option>
                    <option>Litros (L)</option>
                    <option>Unidade (Unit.)</option>
                </select>
                <br><br>
                <label>Quantidade em Estoque</label>
                <br>
                <input type="number">
                <br><br>
                <label>Data de Validade</label>
                <br>
                <input type="date">
                <br><br>
                <label>Lote</label>
                <br>
                <input>
                <br><br>
                <label>Preço de Compra</label>
                <br>
                <input type="number">
                <br><br>
                <label>Fornecedor</label>
                <br>
                <input type="number">
                <br><br>
                <label>Código de Barras</label>
                <br>
                <input type="number">
                <br><br>
                <label>Localização no Estoque</label>
                <br>
                <input>
                <br><br>
                <label>Observações</label>
                <br>
                <textarea rows="3" cols="20"></textarea>
                <br><br>
                <a href="principal.html">
                    <button type="button">Finalizar Cadastro</button>
                </a>
                <br><br>
                <a href="cadastro_usuario.html">
                    <button type="button">Limpar Formulário</button>
                </a>
            </form>
        </td>
    </table>
     <br>
    <table align="center" width="100%" height="65" bgcolor="cc4e3a">
        <tr align="center">
            <td>© 2026 Burger House — Todos os direitos reservados.</td>
        </tr>
    </table>
</body>
</html>
